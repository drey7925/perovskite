syntax = "proto3";

package perovskite.protocol.ui;

import "coordinates.proto";

// Options for a picker refinement (block type or item type picker).
// Currently empty, but provides scaffolding for future enhancements.
message PickerRefinement {}

message TextField {
  // The key used for this textfield in the response
  string key = 1;
  // If non-empty, label to show next to the textfield
  string label = 2;
  // The initial value for the textfield
  string initial = 3;
  // Whether the textfield is editable
  bool enabled = 4;
  // Whether the textfield is multiline
  bool multiline = 5;
  // A tooltip to show on hover
  string hover_text = 6;
  // The refinement to use for this textfield. Absence of field means no
  // refinement (plain text box). See [PickerRefinement] for details.
  oneof refinement {
    // A control that allows selecting a block type. The string will be a
    // block type encoded by name, e.g. `default:stone`.
    PickerRefinement block_type = 7;
    // A control that selects an item type. The string will be an item type
    // encoded by name, e.g. `default:diamond_pickaxe`.
    PickerRefinement item_type = 8;
  }
}

message Checkbox {
  // The key used for this checkbox in the response
  string key = 1;
  // If non-empty, label to show next to the checkbox
  string label = 2;
  // The initial value for the checkbox
  bool initial = 3;
  // Whether the checkbox is editable
  bool enabled = 4;
}

message DropdownEntry {
  string display = 1;
  string value = 2;
}

message Dropdown {
  // The key used for this dropdown in the response
  string key = 1;
  // If non-empty, label to show next to the dropdown
  string label = 2;
  // The initial selected value (must match a value in options, or empty for first option)
  string initial = 3;
  // Whether the dropdown is enabled
  bool enabled = 4;
  // The list of options
  repeated DropdownEntry options = 5;
}

message Button {
  // The key used to identify that this button was clicked
  string key = 1;
  // Text to put on the button itself
  string label = 2;
  // Whether the button is enabled
  bool enabled = 3;
  // If true, clicking the button will close the popup
  bool will_close_popup = 4;
}
message InventoryView {
  uint64 inventory_key = 1;
  bool can_place = 2;
  bool can_take = 3;
  string label = 4;
  bool place_without_swap = 5;
}

message UiElement {
  oneof element {
    string label = 1;
    TextField text_field = 2;
    Button button = 3;
    InventoryView inventory = 4;
    SideBySideLayout side_by_side = 5;
    Checkbox checkbox = 6;
    Dropdown dropdown = 7;
  }
}

message SideBySideLayout {
  string header = 1;
  repeated UiElement element = 2;
}

message PopupDescription {
  uint64 popup_id = 1;
  string title = 2;
  repeated UiElement element = 3;
}

message PopupResponse {
  uint64 popup_id = 1;
  bool closed = 2;
  string clicked_button = 3;
  map<string, string> text_fields = 4;
  map<string, bool> checkboxes = 5;
  map<string, string> dropdowns = 6;
}

// A hint associated with a specific tool/item, used to display real-time
// editing information to the player (e.g. coordinate delta from a selection
// start point).
message ToolHint {
  // If set, the client will display the coordinate delta from this position to
  // the currently highlighted block.
  optional perovskite.protocol.coordinates.WireBlockCoordinate edit_delta_from =
      1;
  // If set, the client will display this string in the tool hint.
  optional string static_string = 2;
}
