syntax = "proto3";
package perovskite.protocol.render;

import "coordinates.proto";

// Geometric transform applied to a texture reference.
// This transform applies to the diffuse, specular, emissive, and normal-map
// textures as a unit, before any static or dynamic crop is applied.
// Note: when a normal map is present, rotating the texture will rotate the
// sampled normal vectors in the map out of alignment with the block face; the
// normals in the map are NOT automatically adjusted to match the new
// orientation.
enum TextureTransform {
  // No transform; the texture is used as-is.
  TEXTURE_TRANSFORM_NONE = 0;
  // Mirror the texture left-to-right.
  TEXTURE_TRANSFORM_FLIP_HORIZONTAL = 1;
  // Mirror the texture top-to-bottom.
  TEXTURE_TRANSFORM_FLIP_VERTICAL = 2;
  // Rotate the texture 90 degrees clockwise.
  TEXTURE_TRANSFORM_ROTATE_CLOCKWISE = 3;
  // Rotate the texture 180 degrees.
  TEXTURE_TRANSFORM_ROTATE_180 = 4;
  // Rotate the texture 270 degrees clockwise (90 degrees counter-clockwise).
  TEXTURE_TRANSFORM_ROTATE_COUNTER_CLOCKWISE = 5;
}

message TextureReference {
  // The diffuse texture + only texture for basic rendering. Alpha channel
  // controls blending, but RenderInfo must also be set accordingly to enable
  // alpha blend. Should be an image in sRGB
  string diffuse = 1;
  // Only supported for rendering blocks, not supported in inventory or popups
  // yet. Applies to ALL textures in this object
  TextureCrop crop = 2;
  // Specular component. *Diffuse*'s alpha channel controls blend between
  // fresnel vs constant specular: 0 = fresnel, 1 = constant. This image's alpha
  // channel is still TBD. Should be an image in sRGB.
  string rt_specular = 3;
  // Light emission component. *Tone-mapped in some TBD way; Components that are
  // full-value (255 for 8-bit images) are likely to be extremely bright. Alpha
  // = 0 -> very tightly focused, alpha = 1 -> isotropic.
  //
  // Because the tone-mapping is still TBD, it's not yet clear whether it should
  // be sRGB or linear. For now, it's interpreted as sRGB and then undergoes
  // additional tone mapping.
  string emissive = 4;
  // Normal-map component. R = tangent, G = bitangent, 0.5 is neutral, 0 and 1
  // point up/down and left/right in texture mapped as vector_component = 2 *
  // (texture_component) - 1 space. Normal component is imputed from the
  // tangent/bitangent components (TBD how) B = TBD. A = TBD.
  //
  // Internal detail: the meaning of tangent/bitangent here is opposite that of
  // the shader (for reasons related to sloped water top face encodings). For
  // texture design, tangent (red channel) runs horizontally in texture space,
  // while `tangent` inside the engine/shaders is vertical in the texture space.
  //
  // Must be LINEAR, not sRGB
  string normal_map = 5;
  // Geometric transform applied to this texture reference (diffuse, specular,
  // emissive, and normal map together). Applied before any static or dynamic
  // crop, so crop coordinates are specified in the pre-transform texture space.
  TextureTransform texture_transform = 6;
  // Alternate form of the diffuse texture, switched by the player. The use-case
  // depends on the game mode and intent; the initial use-case is for symbolic
  // view of rail tracks and other features.
  //
  // If this is unset, the alt diffuse will just be a desaturated/low-contrast
  // form of the original diffuse (exact appearance TBD). If set, this will be
  // _overlaid_ (based on alpha channel) onto the default form.
  //
  // Limitation:
  // There is currently no mechanism to add new transparent areas to the
  // alt-diffuse that weren't already transparent in the diffuse.
  string alt_diffuse = 7;
  // Enables additional effects on the texture itself. This is given as a u32,
  // as a bitwise OR of TextureFlags below. Unsupported flags are ignored.
  // The internal representation of this is implementation-defined; it is not
  // guaranteed that this will fit into a u8 forever.
  uint32 flags = 8;
}

enum TextureFlags {
  // No flags
  TEXTURE_FLAGS_NONE = 0;
  // Put thin grout lines between texels in both horizontal and vertical
  // directions. The exact rendering is implementation-dependent and may affect
  // diffuse, specular, and normal maps.
  //
  // This can be used to make a material look like it's made of fine tiles.
  // The texture itself is responsible for random variation in the color of each
  // texel and (if needed) the specular and normal of each texel; this simply
  // tweaks the edges of texels.
  TEXTURE_FLAGS_WALLTILES_1X = 1;
  // Reserved for future expansion (other wall tile functionalities)
  TEXTURE_FLAGS_WALLTILES_RESERVED_2 = 2;
  TEXTURE_FLAGS_WALLTILES_RESERVED_3 = 3;
}

// If set, the texture will be cropped to the given coordinates.
// Use ranges 0-1 for the full texture
message TextureCrop {
  float left = 1;
  float top = 2;
  float right = 3;
  float bottom = 4;
  // If set, the rectangle defined by the four fields above will
  // be cropped *further* by this dynamic rule
  DynamicCrop dynamic = 5;
}
// The rule defining how to crop a texture based on its variant
message DynamicCrop {
  // AND the variant with this value to get the horizontal grid cell (the 1 bits
  // must be contiguous)...
  uint32 x_selector_bits = 1;
  // out of this many grid cells total. Values range from [0..x_cells-1]
  // with 0 leftmost in the texture
  uint32 x_cells = 2;
  // Do the same thing with these fields to get the vertical grid cell
  // (0 is topmost)
  uint32 y_selector_bits = 3;
  uint32 y_cells = 4;
  // If variant AND this is nonzero, flip the selected grid cell horizontally
  uint32 flip_x_bit = 5;
  // If variant AND this is nonzero, flip the selected grid cell vertically
  uint32 flip_y_bit = 6;
  // If set, invert the logic of flip_x_bit
  bool extra_flip_x = 7;
  // If set, invert the logic of flip_y_bit
  bool extra_flip_y = 8;
}

message CustomMesh {
  // The texture to apply to the mesh
  TextureReference texture = 1;
  // Parallel arrays of vertices. All of these must have the same length
  // In vulkan's coordinate system, with Y going down.
  repeated float x = 2;
  repeated float y = 3;
  repeated float z = 4;
  // Parallel arrays of texture coordinates, relative to the texture field.
  // These will be internally rescaled to fit the position of the texture in
  // any texture atlases
  // u is in [0..1] going left to right
  repeated float u = 5;
  // v is in [0..1] going top to bottom
  repeated float v = 6;
  // Parallel arrays of vertex normals
  repeated float nx = 7;
  repeated float ny = 8;
  repeated float nz = 9;

  // This list's length must be divisible by 3
  // Each three entries in this list define a triangle
  // All values must be <= the number of vertices in the parallel arrays above.
  repeated uint32 indices = 10;
}

message RichTextSpan {
  string text = 1;
  // Height of the text in texels. Due to quirks of font geometry, the exact
  // behavior is TBD. Note that internally, this is only represented with a
  // precision of 1/8 texel (not that any higher precision would effetively
  // matter for font rendering)
  float texel_height = 2;
  // 00RRGGBB, e.g. red is 0xff0000. Instead of alpha, the top byte is simply
  // ignored.
  uint32 color_rgb = 3;
  // AARRGGBB, e.g. red is 0xff0000. The top byte is alpha, meaning the asme
  // thing as the alpha of TextureReference emissive (0 = tightly focused,
  // 255 = very diffuse).
  uint32 emissive_color_rgb = 4;
  // more fields coming eventually
}

// Text that's rendered on signs, other blocks, etc.
// At some point this will contain rendering information to properly apply it to
// a block. For now, this just wraps a string.
message BlockHoverText { string text = 1; }

message RenderedText {
  repeated RichTextSpan spans = 1;
  // In world axes, top left corner of the textbox, relative to the center of
  // the block this text is attached to.
  // (world axes: Y-down, Z-forward, X-right)
  perovskite.protocol.coordinates.Vec3F top_left_corner = 2;
  // In world axes, the vector from top_left_corner to the top-right corner of
  // the textbox.
  perovskite.protocol.coordinates.Vec3F u_extent = 3;
  // In world axes, the vector from top_left_corner to the bottom-left corner
  // of the textbox. If not orthofonal to u_direction, the result will be
  // unpredictable.
  perovskite.protocol.coordinates.Vec3F v_extent = 4;
  // The width of the rendered text in texels. The higher the value, the sharper
  // but more expensive to render.
  int32 u_texels = 5;
  // The height of the rendered text in texels. The higher the value, the
  // sharper but more expensive to render.
  int32 v_texels = 6;
}
